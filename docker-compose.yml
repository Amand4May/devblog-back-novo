services:
  mysql-db:
    image: mysql:8.0
    container_name: ${DB_NAME}   
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}      
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
    - "3306:3306"
    volumes:
      - ./database_dump.sql:/docker-entrypoint-initdb.d/dump.sql
      - db_data:/var/lib/mysql

volumes:
  db_data: